version: "3.9"

services:
  ocr-service:
    image: vllm/vllm-openai:latest
    container_name: ocr-service
    runtime: nvidia
    ipc: host
    ports:
      - "9001:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model lightonai/LightOnOCR-2-1B
      --limit-mm-per-prompt '{"image": 1}'
      --mm-processor-cache-gb 0
      --no-enable-prefix-caching
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  preprocess-service:
    build: ./preprocess
    container_name: preprocess-service
    ports:
      - "9000:9000"
    environment:
      - OCR_URL=http://ocr-service:8000/v1/chat/completions
      - OCR_TEMPERATURE=${OCR_TEMPERATURE:-0.2}
      - OCR_MAX_TOKENS=${OCR_MAX_TOKENS:-2048}
    depends_on:
      ocr-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"