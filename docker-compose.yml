version: "3.9"

services:
  preprocess-service:
    build: .
    container_name: preprocess-service
    network_mode: host
    environment:
      - OCR_URL=http://localhost:${OLLAMA_PORT:-11434}/api/generate
      - OCR_MODEL=${OCR_MODEL:-maternion/LightOnOCR-2:1b}
      - OCR_TEMPERATURE=${OCR_TEMPERATURE:-0.2}
      - OCR_MAX_TOKENS=${OCR_MAX_TOKENS:-2048}
      - OCR_TOP_P=${OCR_TOP_P:-0.9}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
